<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greece 2026 - A Summer Journey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="title">Greece 2026</h1>
            <p class="subtitle">A summer adventure in the land of myths and sunshine</p>
            <p class="trip-dates">June 20 - August 14, 2026 • 55 days together</p>
        </div>
    </header>

    <main class="container">
        <!-- Day Selector -->
        <div class="day-selector-wrapper">
            <div class="day-selector">
                <button class="nav-btn prev-btn" id="prevBtn">← Prev</button>
                <select id="daySelect" class="day-dropdown">
                    <!-- Options generated by JavaScript -->
                </select>
                <button class="nav-btn next-btn" id="nextBtn">Next →</button>
            </div>
        </div>

        <div class="entry-wrapper">
            <!-- Current Entry Display -->
            <article class="journal-entry" id="currentEntry">
                <!-- Content generated by JavaScript -->
            </article>

            <!-- Quick Facts Sidebar -->
            <aside class="quick-facts" id="quickFacts">
                <!-- Generated by JavaScript -->
            </aside>
        </div>

        <!-- Navigation Dots -->
        <div class="dots-container">
            <div class="dots" id="dotsContainer">
                <!-- Dots generated by JavaScript -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>✨ Making memories in Greece ✨</p>
    </footer>

    <script src="journal.js"></script>
</body>
</html>
