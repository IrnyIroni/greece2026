<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greece 2026 - A Summer Journey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="title">🌊 Greece 2026 🌿</h1>
            <p class="subtitle">A summer adventure in the land of myths and sunshine</p>
            <p class="trip-dates">June 20 - August 14, 2026 • 55 days</p>
        </div>
    </header>

    <main class="container">
        <!-- Day Selector -->
        <div class="day-selector-wrapper">
            <div class="day-selector">
                <button class="nav-btn prev-btn" id="prevBtn">← Previous</button>
                <select id="daySelect" class="day-dropdown">
                    <!-- Options generated by JavaScript -->
                </select>
                <button class="nav-btn next-btn" id="nextBtn">Next →</button>
            </div>
        </div>

        <!-- Current Entry Display -->
        <article class="journal-entry" id="currentEntry">
            <!-- Content generated by JavaScript -->
        </article>

        <!-- Navigation Dots -->
        <div class="dots-container">
            <div class="dots" id="dotsContainer">
                <!-- Dots generated by JavaScript -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>✨ Making memories in Greece, Summer 2026 ✨</p>
    </footer>

    <script src="journal.js"></script>
</body>
</html>
